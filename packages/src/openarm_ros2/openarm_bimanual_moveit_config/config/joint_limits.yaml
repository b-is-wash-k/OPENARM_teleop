# joint_limits.yaml allows the dynamics properties specified in the URDF to be
# overwritten or augmented as needed.

# Keep these conservative for RViz/MoveIt testing. You can raise scaling in the
# MotionPlanning panel up to 1.0 if the configured limits are safe for hardware.
default_velocity_scaling_factor: 0.1
default_acceleration_scaling_factor: 0.1

